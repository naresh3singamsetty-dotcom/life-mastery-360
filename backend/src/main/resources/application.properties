# H2 File-based database (data persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/lifemastery;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Web Console (open http://localhost:8080/h2-console to inspect DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

server.port=8080

# JWT Configuration
jwt.secret=lifemastery360-secret-key-for-jwt-authentication-purposes!!
jwt.expiration=86400000
